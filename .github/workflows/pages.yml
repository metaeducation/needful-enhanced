name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/configure-pages@v5

      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Preflight Pages Diagnostics
        uses: actions/github-script@v7
        with:
          script: |
            const {owner, repo} = context.repo;
            core.info(`Repository: ${owner}/${repo}`);
            core.info(`Event: ${context.eventName}`);
            core.info(`Ref: ${context.ref}`);

            if (context.eventName === 'pull_request') {
              core.setFailed(
                'This workflow cannot deploy from pull_request context. Run from a push or workflow_dispatch in this repository.'
              );
              return;
            }

            try {
              const pages = await github.request('GET /repos/{owner}/{repo}/pages', {
                owner,
                repo
              });

              const buildType = pages.data?.build_type ?? 'unknown';
              core.info(`Pages build_type: ${buildType}`);

              if (buildType !== 'workflow') {
                core.setFailed(
                  `GitHub Pages source is "${buildType}". Set Settings > Pages > Build and deployment > Source to "GitHub Actions".`
                );
                return;
              }
            } catch (err) {
              const status = err.status ?? 'unknown';
              core.warning(
                `Could not read Pages configuration via API (status: ${status}). If deploy later fails with 401, check repo/org Actions workflow token permissions.`
              );
            }

            try {
              const perm = await github.request('GET /repos/{owner}/{repo}/actions/permissions/workflow', {
                owner,
                repo
              });

              const defaultPerm = perm.data?.default_workflow_permissions ?? 'unknown';
              core.info(`Default workflow token permission: ${defaultPerm}`);

              if (defaultPerm !== 'write') {
                core.warning(
                  'Workflow token default is not write. If deploy fails with 401, set Settings > Actions > General > Workflow permissions to "Read and write permissions" (or enable at org level).'
                );
              }
            } catch (err) {
              const status = err.status ?? 'unknown';
              core.warning(
                `Could not read Actions workflow-permissions via API (status: ${status}). This can be restricted by org policy.`
              );
            }

            core.info('Preflight checks completed. Proceeding to deploy step.');

      - id: deployment
        uses: actions/deploy-pages@v4
